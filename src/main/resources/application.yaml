info:
  group-id: io.github.miguelarmasabt
  commons-package: ${info.group-id}.commons
  main-package: ${info.group-id}.personal.finances
  rest-client:
    propagate-headers: '@org.eclipse.microprofile.rest.client.annotation.RegisterClientHeaders'

quarkus:
  application:
    name: personal-finances-v1
  http:
    port: ${SERVER_PORT:8080}
    root-path: /poc/personal-finances/v1
    non-application-root-path: q
  log:
    category:
      "org.mongodb.driver.cluster":
        level: WARN
    console:
      enable: true
      json:
        pretty-print: false
  jackson:
    serialization-inclusion: non_null

  openapi:
    generator:
      server:
        use: apicurio
        spec: openapi.yaml
        input-base-dir: src/main/resources/META-INF
        base-package: ${info.main-package}.expenses.rest.server
        use-reactive: false
        use-bean-validation: true
        skip-if-unchanged: false
        patcher:
          enabled: true
          request-bodies:
            saveExpense:
              resource: ExpensesResource
              target-class: ${info.main-package}.expenses.crud.dto.request.ExpenseSaveRequestDto
              parameter-name: data
            updateExpense:
              resource: ExpensesResource
              target-class: ${info.main-package}.expenses.crud.dto.request.ExpenseUpdateRequestDto
              parameter-name: data
            updateExpenseCategories:
              resource: ExpensesResource
              target-class: ${info.main-package}.expenses.categories.dto.request.ExpenseCategoryRequestDto
              parameter-name: data
            assignCategories:
              resource: ExpensesResource
              target-class: ${info.main-package}.expenses.categories.dto.request.ExpenseCategoryAssignmentRequestDto
              parameter-name: data

  openapi-generator:
    codegen:
      spec:
        gmail_yaml:
          base-package: ${info.commons-package}.repository.google
          config-key: gmail
          api-name-suffix: Repository
          mutiny: true
          serializable-model: true
          use-bean-validation: false
          enable-security-generation: false
          additional-api-type-annotations: ${info.rest-client.propagate-headers}

        exchange_rate_yaml:
          base-package: ${info.commons-package}.repository.exchange.rate
          config-key: exchange-rate
          api-name-suffix: Repository
          mutiny: true
          serializable-model: true
          use-bean-validation: false
          enable-security-generation: false

  rest-client:
    logging:
      scope: request-response
      body-limit: 4096

    gmail:
      url: ${GMAIL_ENDPOINT}
      verify-host: false
      connect-timeout: 1500
      read-timeout: 15000
      headers:
        Content-Type: application/json
      params:
        messages:
          page-size: 200
          fields: 'messages/id,nextPageToken'
        message-content:
          format: full

    exchange-rate:
      url: ${EXCHANGE_RATE_ENDPOINT}
      verify-host: false
      connect-timeout: 1500
      read-timeout: 15000
      headers:
        Content-Type: application/json

mp:
  jwt:
    verify:
      issuer: expense-app
      publickey:
        location: publicKey.pem

smallrye:
  jwt:
    sign:
      key:
        location: privateKey.pem
    new-token:
      issuer: ${quarkus.application.name}
      lifespan: 1800 # 30 minutos

org:
  eclipse:
    microprofile:
      rest:
        client:
          propagateHeaders: Authorization,trace-parent,caller-name,request-date

configuration:
  google:
    client-id: ${GOOGLE_CLIENT_ID}

  business:
    expenses:
      search-criteria:
        page-size: 20

