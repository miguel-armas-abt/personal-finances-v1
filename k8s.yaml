---
# Source: generic-backend-chart/templates/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: personal-management-v1-secret
type: Opaque
data: { }
---
# Source: generic-backend-chart/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: personal-management-v1-config-map
data:
  JAVA_OPTS: "-Xms256M -Xmx256M"
  GMAIL_ENDPOINT: "https://gmail.googleapis.com/gmail/v1/"
---
# Source: generic-backend-chart/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: personal-management-v1
  labels:
    app: personal-management-v1
spec:
  type: NodePort
  selector:
    app: personal-management-v1
  ipFamilies:
    - IPv4
  ports:
    - name: personal-management-v1
      port: 8080
      nodePort: 30080
---
# Source: generic-backend-chart/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: personal-management-v1
  labels:
    app: personal-management-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: personal-management-v1
  template:
    metadata:
      labels:
        app: personal-management-v1
    spec:
      containers:
        - name: personal-management-v1
          image: "miguelarmasabt/personal-management:v1.0.1"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1"

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30

          env:
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: personal-management-v1-config-map
                  key: JAVA_OPTS

            - name: CONTACT_DATA_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: personal-management-v1-config-map
                  key: CONTACT_DATA_ENDPOINT

            - name: PENDING_ORDERS_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: personal-management-v1-config-map
                  key: PENDING_ORDERS_ENDPOINT

            - name: AVAILABILITY_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: personal-management-v1-config-map
                  key: AVAILABILITY_ENDPOINT

            - name: RESERVATION_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: personal-management-v1-config-map
                  key: RESERVATION_ENDPOINT